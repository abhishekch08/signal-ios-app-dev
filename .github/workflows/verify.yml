name: Verify Signal
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm run check
  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: xcodebuild -project ios/SignalIOS.xcodeproj -scheme SignalIOS -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO clean build

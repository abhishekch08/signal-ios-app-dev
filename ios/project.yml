name: SignalIOS
options:
  deploymentTarget: { iOS: "17.0" }
targets:
  SignalIOS:
    type: application
    platform: iOS
    sources: [SignalIOS]
    info: { path: SignalIOS/Resources/Info.plist }
    configFiles: { Debug: Config/Config.xcconfig, Release: Config/Config.xcconfig }
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abhishekch08.SignalIOS
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
